spring.application.name=Gastapp
spring.application.jwt_secret=${JWT_SECRET}
spring.application.jwt_secret_expiration=${JWT_SECRET_EXPIRATION}
spring.application.jwt_refresh_secret=${JWT_REFRESH_SECRET}
spring.application.jwt_refresh_secret_expiration=${JWT_REFRESH_SECRET_EXPIRATION}
spring.application.environment=${APP_ENV}

server.forward-headers-strategy=FRAMEWORK

logging.level.org.springframework.web=DEBUG

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Swagger
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true

# Flyway Basic Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# DB with data
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Validation
spring.flyway.validate-on-migrate=true
spring.jpa.hibernate.ddl-auto=validate

# The `clean` command deletes all objects from the database. To prevent accidental deletion, explicitly disable it: Enable true for production environment
 spring.flyway.clean-disabled=false