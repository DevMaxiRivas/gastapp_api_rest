<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <title>Email template</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f4f4f4;">
<table role="presentation" style="width: 100%; border-collapse: collapse;">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table role="presentation" style="width: 600px; border-collapse: collapse; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);">
                <!-- Header -->
                <tr>
                    <td
                            layout:fragment="title"
                            style="padding: 20px; background-color: #28C645; text-align: center; color: #ffffff"
                    >
                        Default Title
                    </td>
                </tr>
                <!-- Content -->
                <tr>
                    <td style="padding: 30px;">
                        <p style="margin: 0 0 20px; font-size: 16px; line-height: 1.5;">Hi <span th:text="${recipientName}">Recipient Name</span>, this is a notification generated by system <span th:text="${appName}">AppName</span></p>
                        <table role="presentation" style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
                            <tr>
                                <td style="padding: 15px; background-color: #f8f8f8; border-left: 4px solid #28C645;">
<!--                                    <p style="margin: 0; font-style: italic; color: #666;" th:text="${content}">-->
<!--                                        Content Text-->
<!--                                    </p>-->
                                    <div layout:fragment="content">
                                        Default Content
                                    </div>
                                </td>
                            </tr>
                        </table>
                        <p style="margin: 0 0 20px; font-size: 16px; line-height: 1.5;">Below is the link to access the system:</p>
                        <div style="width: 100%; text-align: center; margin-bottom: 20px;">
                            <a th:href="@{${website}}"  style="display: inline-block; padding: 12px 24px; background-color: #28C645; color: #ffffff; text-decoration: none; border-radius: 4px; font-weight: bold; margin: 0 auto;">
                                Log in
                            </a>
                        </div>
                        <!--                        <div style="width: 100%; text-align: center;">-->
                        <!--                            <img src="https://drive.google.com/uc?export=view&id=1wOhmGyXwvCzOJHUPDqJCHCGwdCcBP6KI" alt="Logo-Hierronort" width="200px">-->
                        <!--                        </div>-->
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="padding: 20px; background-color: #f4f4f4; text-align: center; color: #888888; font-size: 14px;">
                        <p style="margin: 0;">This is an automated email. Please do not reply directly to this email.</p>
                        <p style="margin: 10px 0 0;">©<span th:text="${currentYear}"></span> <span th:text="${appName}"></span>. All rights reserved</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
